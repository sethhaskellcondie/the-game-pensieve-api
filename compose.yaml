services:
  frontend:
    image: sethcondie/the-game-pensieve-web:latest
    ports:
      - "4200:3000" #host port:container port (Next.js server listens on 3000)
    environment:
      # Server-side only; must include the /v1 prefix. Reaches the backend service
      # over the compose network.
      API_BASE_URL: http://backend:8080/v1
    depends_on:
      - backend
  backend:
    depends_on:
      - db
    build:
      context: .
      args:
        JAR_FILE: target/*.jar
    ports:
      - "8080:8080" #host port:container port
    environment:
      SPRING_PROFILES_ACTIVE: docker
  mcp:
    build:
      context: ./mcp
    ports:
      - "8090:3000" #host port:container port (MCP Streamable HTTP endpoint at /mcp)
    environment:
      # Reaches the backend service over the compose network; must include the /v1 prefix.
      API_BASE_URL: http://backend:8080/v1
      PORT: "3000"
      # OAuth (Phase 4). MCP_AUTH_MODE defaults to "auto": enforce only when the backend reports
      # secureMode=true. The dev backend runs the unsecured `docker` profile, so enforcement stays
      # OFF here (tokenless, as in Phases 1-2) until Phase 5 secures the backend.
      # iss is the canonical host-facing issuer; JWKS is fetched over the internal compose network.
      MCP_OAUTH_ISSUER: http://localhost:8081/realms/pensieve
      MCP_OAUTH_JWKS_URI: http://keycloak:8080/realms/pensieve/protocol/openid-connect/certs
      MCP_OAUTH_AUDIENCE: http://localhost:8090/mcp
    depends_on:
      - backend
      - keycloak
  flyway:
    depends_on:
      - db
    image: flyway/flyway
    # these commands use the provided volumes on the flyway container: https://hub.docker.com/r/flyway/flyway
    # -configFiles=/flyway/conf/flyway.config : will use the docker-flyway.config in this container
    # -locations=filesystem:/flyway/sql : tells the system we are using sql migration files (not java)
    # -connectRetries=60 in case the db container isn't running before the flyway container this will cause it to retry for about a minute
    # migrate (tells flyway what to do on load)
    command: -configFiles=/flyway/conf/flyway.config -locations=filesystem:/flyway/sql -connectRetries=60 migrate
    volumes:
      - ${PWD}/src/main/resources/migrations:/flyway/sql       # these are host volumes (bind mounts)
      - ${PWD}/docker-flyway.config:/flyway/conf/flyway.config # host file path:container volume path
  db:
    image: postgres:16.2-alpine
    ports:
      - "5432:5432" #host port:container port
    environment:
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: pensieve-db
  keycloak:
    image: quay.io/keycloak/keycloak:26.7
    # start-dev = dev mode (HTTP ok, no hostname strictness). --import-realm loads the pensieve realm
    # from the mounted import dir on first boot. The import is fully declarative (pensieve:read scope +
    # audience mapper + built-in scopes + anonymous DCR are all in keycloak/import/pensieve-realm.json).
    command: start-dev --import-realm
    ports:
      - "8081:8080" #host 8081 -> container 8080 (backend already uses host 8080)
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Pin the frontend hostname so token `iss` is CANONICAL and stable regardless of how Keycloak
      # is reached (browser via localhost:8081). BACKCHANNEL_DYNAMIC lets containers on the compose
      # network still reach endpoints via http://keycloak:8080 (used for JWKS fetches by the sidecar
      # and API, which validate against the canonical issuer but fetch keys over the internal net).
      KC_HOSTNAME: http://localhost:8081
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    volumes:
      - ${PWD}/keycloak/import:/opt/keycloak/data/import:ro
      - keycloak_data:/opt/keycloak/data

volumes:
  keycloak_data:
