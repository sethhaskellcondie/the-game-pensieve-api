                      entityKey: "toy"
                      order: 0
                      options: []
                  toys:
                    - key: "toy"
                      id: 1
                      name: "Darkwing Duck"
                      set: "Misc"
                      createdAt: 1757970298640
                      updatedAt: 1757970298640
                      deletedAt: null
                      customFieldValues:
                        - customFieldId: 1
                          customFieldName: "Broken"
                          customFieldType: "boolean"
                          value: "true"
