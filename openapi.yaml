                      createdAt: 1757970298640
                      updatedAt: 1757970298640
                      deletedAt: null
                errors: null
                roundTripMs: 31

  /v1/function/import:
    post:
      tags:
        - Data Management
      summary: Import data from request body
      description: |
        Import a collection from a backup document supplied in the request body (wrapped under
        `data`). The import is idempotent: existing records are matched by their natural keys — custom
        fields by name+entity, toys by name+set, systems by name, video/board games by title,
        metadata by key — rather than by the ids in the payload, so re-importing the same backup
        creates nothing new and only increments the `existing*` counts. Parent references inside the
        payload (e.g. a video game's system, a board game box's base set) are resolved by
        name/title, not by the file's ids, so ids may safely differ from the live database.

        Only one import may run at a time; a concurrent attempt returns **409 Conflict**. Per-record
        failures do not fail the whole request — they are reported in `exceptionBackupImport` and the
        envelope's `errors` array while the endpoint still returns **200**.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  $ref: '#/components/schemas/BackupData'
              required:
                - data
            example:
              data:
                customFields:
                  - id: 1
                    name: "Broken"
                    type: "boolean"
                    entityKey: "toy"
                    order: 0
                    options: []
                toys:
                  - key: "toy"
                    id: 1
                    name: "Darkwing Duck"
                    set: "Misc"
                    createdAt: 1757970298640
                    updatedAt: 1757970298640
                    deletedAt: null
                    customFieldValues:
                      - customFieldId: 1
                        customFieldName: "Broken"
                        customFieldType: "boolean"
                        value: "true"
                systems: []
                videoGameBoxes: []
                boardGameBoxes: []
                metadata: []
      responses:
        '200':
          description: Import results (HTTP 200 even when some records fail — inspect errors)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ImportResults'
                  errors:
                    type: array
                    items:
                      type: string
                    description: Empty array on a clean import; one string per record that failed to import
                  roundTripMs:
                    type: integer
                    format: int64
              example:
                data:
                  existingCustomFields: 0
                  createdCustomFields: 1
                  existingToys: 0
                  createdToys: 1
                  existingSystems: 0
                  createdSystems: 0
                  existingVideoGameBoxes: 0
                  createdVideoGameBoxes: 0
                  existingBoardGameBoxes: 0
                  createdBoardGameBoxes: 0
                  existingMetadata: 0
                  createdMetadata: 0
                errors: []
                roundTripMs: 47
        '409':
          description: An import is already in progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                data: null
                errors:
                  - "An import is already in progress. Please wait for it to complete before starting another."

  /v1/function/importFromFile:
    post:
      tags:
        - Data Management
      summary: Import data from backup.json file
      description: |
        Import collection data from a `backup.json` file located in the application's working
        directory (the same file produced by `POST /v1/function/backup`). Same idempotent matching
        and concurrency rules as `POST /v1/function/import`. Returns 200 with per-record failures in
        `exceptionBackupImport`; returns 409 if an import is already running.
      responses:
