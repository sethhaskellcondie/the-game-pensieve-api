openapi: 3.0.3
info:
  title: The Game Pensieve API
  description: |
    The Game Pensieve is a comprehensive collection management system for gaming items including toys, video games, board games, and gaming systems. 
    
    This API provides full CRUD operations for managing your gaming collection with support for custom fields, advanced filtering, and data backup/import functionality.

    ## Response Format
    Every **successful** response is wrapped in a consistent envelope:
    ```json
    {
      "data": <response_data>,
      "errors": null,
      "roundTripMs": 12
    }
    ```
    - `data` — the payload (an object, an array, or an empty string `""` for deletes). `null` on error.
    - `errors` — always `null` on success.
    - `roundTripMs` — server-side processing time in milliseconds, measured from request receipt to response. Present only on successful responses produced by the controllers; it is **absent** from error responses.

    ## Error Format
    Errors do **not** include `roundTripMs`. `data` is `null` and `errors` is always an **array of strings** (one entry per problem found — a single request can report several validation errors at once):
    ```json
    {
      "data": null,
      "errors": ["title cannot be blank", "systemId must be a positive integer"]
    }
    ```
    Status codes used:
    - **400 Bad Request** — input/validation failure (blank required field, malformed entity, invalid custom field value, duplicate that violates a uniqueness rule, invalid filter).
    - **404 Not Found** — the requested resource (or an unknown route) does not exist.
    - **409 Conflict** — an import is already in progress (the import endpoints take a global lock).
    - **500 Internal Server Error** — an unexpected error; the array contains a generic message followed by the underlying exception message.
    - **200 OK with populated `errors`** — the backup/import endpoints report partial failures here: the import still returns HTTP 200, but `errors` lists the records that could not be processed. Always inspect `errors` on these endpoints even on a 200.

    ## Timestamps
    All `createdAt`, `updatedAt`, and `deletedAt` fields are serialized as **epoch milliseconds** (a JSON integer, e.g. `1757970298640`), not ISO-8601 strings. `deletedAt` is `null` for records that have not been soft-deleted. This applies uniformly to entities, custom fields, metadata, and backup exports.

    ## Entity Relationships
    - **Systems** are gaming platforms (Nintendo Switch, PlayStation, NES, etc.).
    - **Video Games** belong to a System and are contained by one or more **Video Game Boxes**. Video games are never created on their own — they are created through a Video Game Box (`newVideoGames`) or linked to one by id (`existingVideoGameIds`). There is no `POST /v1/videoGames`; only GET, PUT (update), and search exist.
    - **Video Game Boxes** belong to a System and contain one or more Video Games. A box with more than one game has `isCollection: true`.
    - **Board Games** are the underlying game; **Board Game Boxes** are the physical boxes that contain exactly one Board Game. Like video games, board games are never created directly — they are created through a Board Game Box (`boardGame`) or linked by id (`boardGameId`). There is no `POST /v1/boardGames`; only GET, PUT (update), and search exist.
    - **Toys** are standalone collectibles.
    - **Custom Fields** define typed, reusable metadata fields scoped to one entity type. Each entity carries a `customFieldValues` array holding its values.
    - **Metadata** is arbitrary JSON stored under a unique string key, independent of the collection entities.

    ## Custom Field Values
    Every entity request and response carries a `customFieldValues` array. Each entry is `{ customFieldId, customFieldName, customFieldType, value, valueOptionId }` where `value` is **always a string**, regardless of the field's type — `"true"`/`"false"` for booleans, `"2006"` for numbers. On creation you may send `customFieldId: 0` as a placeholder when the value is keyed by `customFieldName`; the server returns the resolved id in the response.

    For **enum** types (`dropdown`, `radio_button`, `progress_bar`) the selected option is stored as a reference to an option id. On **write** send `valueOptionId` set to the chosen option's id (the `value` text is ignored and derived by the server). On **read** the response returns both `valueOptionId` (the option id) and `value` (the option's current text). Because the value is a reference, renaming an option is automatically reflected in existing values. For all non-enum types `valueOptionId` is `null`.

    ### Updating values (partial upsert)
    On an entity `PUT`, the `customFieldValues` array is applied as a **partial upsert keyed by `customFieldId`**: each entry you include is created or updated, and any value you **omit is left unchanged** — an update never deletes a value. This means you can update a single custom field by sending **only that one entry** in `customFieldValues`; you do **not** need to send the entity's full set of values. The response always returns the entity's complete, current set of values regardless of how many you sent.

    Two consequences for clients:
    - **Do not send placeholder entries for values that have no selection yet — omit them.** In particular, an enum entry with `valueOptionId: null` is **rejected with a 400** (`valueOptionId` must reference a valid option of that field). To leave an enum field unset, simply leave it out of the array.
    - **There is currently no way to clear a value once set.** Omitting an entry keeps its existing stored value; it does not remove it. (Changing the selection is supported — send the entry with the new `valueOptionId`.)

    ## Filter System
    The API provides advanced filtering capabilities through the `/{entity}/function/search` endpoints. Call `GET /v1/filters/{entity}` first to discover the fields and operators available for an entity. Operators by field type:
    - **Text filters**: equals, not_equals, contains, starts_with, ends_with
    - **Number filters**: equals, not_equals, greater_than, less_than, greater_than_equal_to, less_than_equal_to
    - **Boolean filters**: equals
    - **Time filters**: since, before (operand is epoch milliseconds or an ISO datetime string)
    - **System filters**: equals, not_equals (for `system_id` on video games and video game boxes)
    - **Enum custom field filters** (`dropdown`, `radio_button`, `progress_bar`): equals, not_equals — the operand is the selected option's id (a whole number). These fields filter by option id (like system filters), so they support no sorting and no text matching (contains/starts_with/ends_with).
    - **Custom field filters**: filter on a custom field by sending its field metadata (custom fields surface as filterable fields for their entity)
    - **Sort and Pagination**: order_by, order_by_desc, limit, offset — multiple sort filters are supported and applied in request order (first = primary sort, second = tiebreaker, ...)
  version: 1.0.0
  contact:
    name: The Game Pensieve API Support
servers:
  - url: http://localhost:8080
    description: Local development server
security:
  - BearerAuth: []
paths:
  /v1/heartbeat:
    get:
      tags:
        - System
      summary: Health check endpoint
      description: Simple health check. Returns the string "thump thump" inside the standard response envelope.
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string
                    example: "thump thump"
                  errors:
                    type: 'null'
                  roundTripMs:
                    type: integer
                    format: int64
              example:
                data: "thump thump"
                errors: null
                roundTripMs: 0

  /v1/toys:
    post:
      tags:
        - Toys
      summary: Create a new toy
      description: |
        Create a new toy. `name`, `set`, and `customFieldValues` are required (send an empty
        `customFieldValues` array if there are no values). A toy with the same `name` and `set`
        as an existing toy is rejected with a 400.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                toy:
                  $ref: '#/components/schemas/ToyRequest'
              required:
                - toy
            example:
              toy:
                name: "Darkwing Duck"
                set: "Misc"
                customFieldValues:
                  - customFieldId: 1
                    customFieldName: "Broken"
                    customFieldType: "boolean"
                    value: "false"
                  - customFieldId: 11
                    customFieldName: "Quantity"
                    customFieldType: "number"
                    value: "1"
      responses:
        '201':
          description: Toy created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToyDataResponse'
              example:
                data:
                  key: "toy"
                  id: 1
                  name: "Darkwing Duck"
                  set: "Misc"
                  createdAt: 1757970298640
                  updatedAt: 1757970298640
                  deletedAt: null
                  customFieldValues:
                    - customFieldId: 1
                      customFieldName: "Broken"
                      customFieldType: "boolean"
                      value: "false"
                    - customFieldId: 11
                      customFieldName: "Quantity"
                      customFieldType: "number"
                      value: "1"
                errors: null
                roundTripMs: 9
        '400':
          description: Invalid input data (e.g. blank name, or duplicate name+set)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                data: null
                errors:
                  - "Name is required for a Toy"

  /v1/toys/{id}:
    get:
      tags:
        - Toys
      summary: Get a toy by ID
      parameters:
        - $ref: '#/components/parameters/EntityId'
      responses:
        '200':
          description: Toy found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToyDataResponse'
              example:
                data:
                  key: "toy"
                  id: 1
                  name: "Darkwing Duck"
                  set: "Misc"
                  createdAt: 1757970298640
                  updatedAt: 1757970298640
                  deletedAt: null
                  customFieldValues:
                    - customFieldId: 1
                      customFieldName: "Broken"
                      customFieldType: "boolean"
                      value: "true"
                    - customFieldId: 11
                      customFieldName: "Quantity"
                      customFieldType: "number"
                      value: "1"
                    - customFieldId: 12
                      customFieldName: "Notes"
                      customFieldType: "text"
                      value: "10 / 10 no notes"
                errors: null
                roundTripMs: 4
        '404':
          description: Toy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                data: null
                errors:
                  - "Resource Not Found: toy not found in the database with id: 1"
    put:
      tags:
        - Toys
      summary: Update a toy
      parameters:
        - $ref: '#/components/parameters/EntityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                toy:
                  $ref: '#/components/schemas/ToyRequest'
              required:
                - toy
      responses:
        '200':
          description: Toy updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToyDataResponse'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Toy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Toys
      summary: Delete a toy
      parameters:
        - $ref: '#/components/parameters/EntityId'
      responses:
        '204':
          description: Toy deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: Toy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/toys/function/search:
    post:
      tags:
        - Toys
      summary: Search toys with filters
      description: |
        Search and filter toys. Send a `filters` array; an empty array returns all toys.
        Combine multiple filters (they are ANDed), add `order_by`/`order_by_desc` to sort, and
        `limit`/`offset` to paginate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilterRequest'
            example:
              filters:
                - key: toy
                  field: set
                  operator: equals
                  operand: "Misc"
                - key: toy
                  field: name
                  operator: order_by
                  operand: ""
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ToyResponse'
                  errors:
                    type: 'null'
                  roundTripMs:
                    type: integer
                    format: int64
              example:
                data:
                  - key: "toy"
                    id: 1
                    name: "Darkwing Duck"
                    set: "Misc"
                    createdAt: 1757970298640
                    updatedAt: 1757970298640
                    deletedAt: null
                    customFieldValues:
                      - customFieldId: 1
                        customFieldName: "Broken"
                        customFieldType: "boolean"
                        value: "true"
                errors: null
                roundTripMs: 6

  /v1/systems:
    post:
      tags:
        - Systems
      summary: Create a new system
      description: |
        Create a gaming system/platform. `name`, `generation`, `handheld`, and `customFieldValues`
        are required. A system name must be unique.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                system:
                  $ref: '#/components/schemas/SystemRequest'
              required:
                - system
            example:
              system:
                name: "Wii"
                generation: 7
                handheld: false
                customFieldValues:
                  - customFieldId: 2
                    customFieldName: "Release Year"
                    customFieldType: "number"
                    value: "2006"
                  - customFieldId: 3
                    customFieldName: "Company"
                    customFieldType: "text"
                    value: "Nintendo"
      responses:
        '201':
          description: System created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemDataResponse'
              example:
                data:
                  key: "system"
                  id: 2
                  name: "Wii"
                  generation: 7
                  handheld: false
                  createdAt: 1757970298680
                  updatedAt: 1757970298680
                  deletedAt: null
                  customFieldValues:
                    - customFieldId: 2
                      customFieldName: "Release Year"
                      customFieldType: "number"
                      value: "2006"
                    - customFieldId: 3
                      customFieldName: "Company"
                      customFieldType: "text"
                      value: "Nintendo"
                errors: null
                roundTripMs: 11
        '400':
          description: Invalid input data (e.g. blank name or a duplicate system name)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/systems/{id}:
    get:
      tags:
        - Systems
      summary: Get a system by ID
      parameters:
        - $ref: '#/components/parameters/EntityId'
      responses:
        '200':
          description: System found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemDataResponse'
              example:
                data:
                  key: "system"
                  id: 2
                  name: "Wii"
                  generation: 7
                  handheld: false
                  createdAt: 1757970298680
                  updatedAt: 1757970298680
                  deletedAt: null
                  customFieldValues:
                    - customFieldId: 2
                      customFieldName: "Release Year"
                      customFieldType: "number"
                      value: "2006"
                    - customFieldId: 3
                      customFieldName: "Company"
                      customFieldType: "text"
                      value: "Nintendo"
                errors: null
                roundTripMs: 4
        '404':
          description: System not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                data: null
                errors:
                  - "Resource Not Found: system not found in the database with id: 2"
    put:
      tags:
        - Systems
      summary: Update a system
      parameters:
        - $ref: '#/components/parameters/EntityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                system:
                  $ref: '#/components/schemas/SystemRequest'
              required:
                - system
      responses:
        '200':
          description: System updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemDataResponse'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: System not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Systems
      summary: Delete a system
      parameters:
        - $ref: '#/components/parameters/EntityId'
      responses:
        '204':
          description: System deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: System not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/systems/function/search:
    post:
      tags:
        - Systems
      summary: Search systems with filters
      description: |
        Search and filter systems. Common fields include `name` (text), `generation` (number),
        and `handheld` (boolean). Send an empty `filters` array to return all systems.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilterRequest'
            example:
              filters:
                - key: system
                  field: handheld
                  operator: equals
                  operand: "false"
                - key: system
                  field: generation
                  operator: greater_than_equal_to
                  operand: "7"
                - key: system
                  field: generation
                  operator: order_by_desc
                  operand: ""
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SystemResponse'
                  errors:
                    type: 'null'
                  roundTripMs:
                    type: integer
                    format: int64
              example:
                data:
                  - key: "system"
                    id: 2
                    name: "Wii"
                    generation: 7
                    handheld: false
                    createdAt: 1757970298680
                    updatedAt: 1757970298680
                    deletedAt: null
                    customFieldValues: []
                errors: null
                roundTripMs: 5

  /v1/videoGameBoxes:
    post:
      tags:
        - Video Game Boxes
      summary: Create a new video game box
      description: |
        Create a video game box together with the video games it contains. This is the only way to
        create video games — there is no standalone `POST /v1/videoGames`. Provide the games either
        as `existingVideoGameIds` (ids of games already in the database) and/or `newVideoGames`
        (games to create inline); at least one game must be present across the two lists. A box that
        ends up holding more than one game is returned with `isCollection: true`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                videoGameBox:
                  $ref: '#/components/schemas/VideoGameBoxRequest'
              required:
                - videoGameBox
            example:
              videoGameBox:
                title: "Kirby's Adventures"
                systemId: 3
                existingVideoGameIds: []
                newVideoGames:
                  - title: "Kirby's Adventures"
                    systemId: 3
                    customFieldValues:
                      - customFieldId: 4
                        customFieldName: "Developer"
                        customFieldType: "text"
                        value: "HAL Laboratory"
                isPhysical: true
                customFieldValues:
                  - customFieldId: 6
                    customFieldName: "Enhanced Port"
                    customFieldType: "boolean"
                    value: "false"
      responses:
        '201':
          description: Video game box created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoGameBoxDataResponse'
              example:
                data:
                  key: "videoGameBox"
                  id: 1
                  title: "Kirby's Adventures"
                  system:
                    key: "system"
                    id: 3
                    name: "NES"
                    generation: 3
                    handheld: false
                    createdAt: 1757970298685
                    updatedAt: 1757970298685
                    deletedAt: null
                    customFieldValues: []
                  videoGames:
                    - id: 1
                      title: "Kirby's Adventures"
                      system:
                        key: "system"
                        id: 3
                        name: "NES"
                        generation: 3
                        handheld: false
                        createdAt: 1757970298685
                        updatedAt: 1757970298685
                        deletedAt: null
                        customFieldValues: []
                      createdAt: 1757970298690
                      updatedAt: 1757970298690
                      deletedAt: null
                      customFieldValues:
                        - customFieldId: 4
                          customFieldName: "Developer"
                          customFieldType: "text"
                          value: "HAL Laboratory"
                  isPhysical: true
                  isCollection: false
                  createdAt: 1757970298690
                  updatedAt: 1757970298690
                  deletedAt: null
                  customFieldValues:
                    - customFieldId: 6
                      customFieldName: "Enhanced Port"
                      customFieldType: "boolean"
                      value: "false"
                errors: null
                roundTripMs: 14
        '400':
          description: Invalid input data (e.g. blank title, unknown systemId, or no games supplied)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/videoGameBoxes/{id}:
    get:
      tags:
        - Video Game Boxes
      summary: Get a video game box by ID
      parameters:
        - $ref: '#/components/parameters/EntityId'
      responses:
        '200':
          description: Video game box found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoGameBoxDataResponse'
        '404':
          description: Video game box not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Video Game Boxes
      summary: Update a video game box
      parameters:
        - $ref: '#/components/parameters/EntityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                videoGameBox:
                  $ref: '#/components/schemas/VideoGameBoxRequest'
              required:
                - videoGameBox
      responses:
        '200':
          description: Video game box updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoGameBoxDataResponse'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Video game box not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Video Game Boxes
      summary: Delete a video game box
      parameters:
        - $ref: '#/components/parameters/EntityId'
      responses:
        '204':
          description: Video game box deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: Video game box not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/videoGameBoxes/function/search:
    post:
      tags:
        - Video Game Boxes
      summary: Search video game boxes with filters
      description: |
        Search video game boxes using various filters including system filtering.

        **System Filter Example**: Filter video game boxes by their gaming system:
        ```json
        {
          "filters": [
            {
              "key": "videoGameBox",
              "field": "system_id",
              "operator": "not_equals",
              "operand": "3"
            }
          ]
        }
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilterRequest'
            example:
              filters:
                - key: videoGameBox
                  field: system_id
                  operator: equals
                  operand: "2"
                - key: videoGameBox
                  field: isPhysical
                  operator: equals
                  operand: "true"
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/VideoGameBoxResponse'
                  errors:
                    type: 'null'

  /v1/videoGames/{id}:
    get:
      tags:
        - Video Games
      summary: Get a video game by ID
      description: |
        Returns a single video game, including every box that contains it under `videoGameBoxes`.
        Note that the nested box flags here are named `physical`/`collection` (no `is` prefix),
        unlike the top-level VideoGameBox response which uses `isPhysical`/`isCollection`.
      parameters:
        - $ref: '#/components/parameters/EntityId'
      responses:
        '200':
          description: Video game found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoGameDataResponse'
              example:
                data:
                  key: "videoGame"
                  id: 1
                  title: "Kirby's Adventures"
                  system:
                    key: "system"
                    id: 3
                    name: "NES"
                    generation: 3
                    handheld: false
                    createdAt: 1757970298685
                    updatedAt: 1757970298685
                    deletedAt: null
                    customFieldValues: []
                  videoGameBoxes:
                    - id: 1
                      title: "Kirby's Adventures"
                      system:
                        key: "system"
                        id: 3
                        name: "NES"
                        generation: 3
                        handheld: false
                        createdAt: 1757970298685
                        updatedAt: 1757970298685
                        deletedAt: null
                        customFieldValues: []
                      physical: true
                      collection: false
                      createdAt: 1757970298690
                      updatedAt: 1757970298690
                      deletedAt: null
                      customFieldValues: []
                  createdAt: 1757970298690
                  updatedAt: 1757970298690
                  deletedAt: null
                  customFieldValues:
                    - customFieldId: 4
                      customFieldName: "Developer"
                      customFieldType: "text"
                      value: "HAL Laboratory"
                errors: null
                roundTripMs: 5
        '404':
