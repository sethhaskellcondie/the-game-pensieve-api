  /v1/admin/users:
    get:
      tags:
        - Admin
      summary: List all user accounts (admin only)
      description: |
        List every account with its effective role, role override, and billing fields. **Admin only**: the
        caller must resolve to the `ADMIN` role (pinned via `role_override`); any other authenticated caller
        receives **403**, and an anonymous caller **401**. These routes bypass the per-request tenant
        transaction so they can read the `users` table (which the demoted RLS role cannot access).
      responses:
        '200':
          description: The list of user accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminUser'
                  errors:
                    type: array
                    items:
                      type: string
                  roundTripMs:
                    type: integer
                    format: int64
        '401':
          description: Authentication required (anonymous caller)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: The caller does not resolve to the ADMIN role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/admin/users/{id}/role:
    post:
      tags:
        - Admin
      summary: Set or clear a user's role override (admin only)
      description: |
        Pin the target user to a specific role, or clear the pin to revert to auto-derivation. Send
        `roleOverride` as one of `GUEST`, `TRIAL`, `PAID`, `LAPSED`, `ADMIN`, or `null` to clear. The change
        takes effect on the target's next request (the role is re-derived per request). **Admin only** (403
        for non-admins, 401 for anonymous). An unknown role value returns **400**; an unknown user id **404**.

        **At most one ADMIN may exist**: pinning `ADMIN` while another account already holds the pin returns
        **400** ("An admin already exists. Clear the current admin's role override first."). Re-pinning the
        existing admin is an idempotent 200, and the sole admin may clear their own pin (self-demotion — the
        documented SQL bootstrap is the recovery path).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: The target user's id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRoleOverrideRequest'
            example:
              roleOverride: "PAID"
      responses:
        '200':
          description: The updated user account
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AdminUser'
                  errors:
                    type: array
                    items:
                      type: string
                  roundTripMs:
                    type: integer
                    format: int64
        '400':
          description: The role value is not one of the five roles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required (anonymous caller)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: The caller does not resolve to the ADMIN role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No user with that id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/admin/users/{id}/showcase:
    post:
      tags:
        - Admin
      summary: Grant or clear a user's public showcase (admin only)
      description: |
        Publish the target user's collection as a public showcase, or unpublish it. A non-blank `slug` grants
        the showcase: the slug is both the entitlement and the public address (`X-Showcase: <slug>`), and `name`
        is the display title listed by `GET /v1/showcases` (owner emails are never exposed). A `null`/blank
        `slug` clears the grant (the name is cleared with it).

        The showcase is **visible only while the owner derives to PAID or ADMIN** — granting a slug to a TRIAL
        or LAPSED user reserves the address but the showcase answers 404 until they are PAID. Slugs must match
        `^[a-z0-9](-?[a-z0-9])*$` (lowercase alphanumerics, single interior hyphens) and be **unique** — a slug
        already held by another user returns **400**. **Admin only** (403 for non-admins, 401 for anonymous);
        an unknown user id returns **404**. This grant is the backend-authoritative entitlement a future Paddle
        showcase product would automate.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: The target user's id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetShowcaseRequest'
            example:
              slug: "retro-vault"
              name: "The Retro Vault"
      responses:
        '200':
          description: The updated user account (showcaseSlug/showcaseName reflect the grant or clear)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AdminUser'
                  errors:
                    type: array
                    items:
                      type: string
                  roundTripMs:
                    type: integer
                    format: int64
        '400':
          description: The slug is malformed, or already taken by another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                data: null
                errors: ["Failed Input Validation: The showcase slug 'retro-vault' is already taken."]
        '401':
          description: Authentication required (anonymous caller)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: The caller does not resolve to the ADMIN role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No user with that id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/showcases:
    get:
      tags:
        - Showcases
      summary: List all visible public showcases
      security: []
      description: |
        The public showcase directory: every showcase whose owner currently derives to PAID or ADMIN, as
        `{slug, name}` pairs — never emails or any other account field. Pass a listed `slug` in the
        `X-Showcase` header on the read endpoints to browse that collection. **Public**: no token required
        (under both profiles); authenticated callers see the same listing. A lapsed owner's showcase drops out
        of this directory exactly when its slug stops resolving.
      responses:
        '200':
          description: The visible showcases
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Showcase'
                  errors:
                    type: array
                    items:
                      type: string
                  roundTripMs:
                    type: integer
                    format: int64
              example:
                data:
                  - slug: "seths-collection"
                    name: "Seth's Collection"
                  - slug: "retro-vault"
                    name: "The Retro Vault"
                errors: null
                roundTripMs: 3

  /v1/metadata:
    post:
      tags:
        - Metadata
      summary: Create new metadata
      description: |
        Create a new metadata entry under a unique `key`. The `value` is a string that must itself
        parse as valid JSON (it is stored re-serialized, so whitespace may be normalized). Send
        `id` and the timestamps as null on create — they are server-generated.

        Metadata is **read-only on a showcase view**: a request carrying `X-Showcase` (GUEST-scoped)
        is rejected with **403** (`secured` profile), even when authenticated — a public showcase can
        never be mutated. Enforcement is off in the default (unsecured) build.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                metadata:
                  $ref: '#/components/schemas/MetadataRequest'
              required:
                - metadata
            example:
              metadata:
                id: null
                key: "uiPreferences"
                value: "{\"theme\":\"dark\",\"itemsPerPage\":25}"
                createdAt: null
                updatedAt: null
                deletedAt: null
      responses:
        '201':
          description: Metadata created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetadataDataResponse'
              example:
                data:
                  id: 1
                  key: "uiPreferences"
                  value: "{\"theme\": \"dark\", \"itemsPerPage\": 25}"
                  createdAt: 1757970298640
                  updatedAt: 1757970298640
                  deletedAt: null
                errors: null
                roundTripMs: 8
        '400':
          description: Invalid input data or invalid JSON value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                data: null
                errors:
                  - "Value must be valid JSON: Unexpected character ('}' (code 125))"
        '403':
          description: '(`secured` profile) the request is a GUEST showcase view (`X-Showcase`); metadata is read-only there'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Metadata
      summary: Get all metadata
      description: |
        Retrieve all metadata entries. On a showcase view (`X-Showcase`, GUEST-scoped) the owner's
        entries are returned but `ui-settings` is replaced with the fixed guest settings (see
        `GET /v1/metadata/{key}`). This list-all route is **not** part of the anonymous read surface —
        it requires a token under the `secured` profile.
      responses:
        '200':
          description: List of all metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MetadataResponse'
                  errors:
                    type: 'null'

  /v1/metadata/{key}:
    get:
      tags:
        - Metadata
      summary: Get metadata by key
      description: |
        Retrieve a specific metadata entry by its unique key.

        **Showcase view (`X-Showcase`, GUEST-scoped).** Four keys form part of the anonymous,
        showcase-scoped read surface (reachable **without a token**): `ui-settings`,
        `default_sort_options`, `saved-filters`, and `saved-filter-categories`. On a showcase view:
        - `ui-settings` returns a **fixed guest payload** — beginner mode on, every other mode off,
          both collection default views `"list"`, every standard field shown — *independent of* the
          owner's own stored settings (it is synthesized, so it is returned even if the owner has no
          `ui-settings` row, and never 404s).
        - every other key — `default_sort_options`, `saved-filters`, `saved-filter-categories` —
          passes through to the **owner's own row** via Row-Level Security, so a guest mirrors (and
          stays in sync with) the sort, filters, and categories the owner configured for the showcase.
          A key the owner has not set still 404s.

        Off a showcase view (an authenticated owner, or an anonymous no-header request resolving to the
        default showcase) the stored value is returned unchanged. An unknown or not-visible `X-Showcase`
        slug → **404** (indistinguishable from an absent slug).
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: Unique key for the metadata entry
        - $ref: '#/components/parameters/ShowcaseView'
      responses:
        '200':
          description: Metadata found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetadataDataResponse'
        '404':
          description: Metadata not found, or the `X-Showcase` header named a slug that does not exist or is not currently visible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - Metadata
      summary: Update metadata value
      description: |
        Update the JSON value of an existing metadata entry, addressed by its `key`. Only the value
        is updatable; the key is immutable. Uses the HTTP **PATCH** method (not PUT). The request
        body is `{ "value": "<json-string>" }`, not the wrapped `{ "metadata": ... }` shape.
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: Unique key for the metadata entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
                  description: New JSON value (must be valid JSON)
              required:
                - value
            example:
              value: "{\"theme\":\"light\",\"itemsPerPage\":50}"
      responses:
        '200':
          description: Metadata updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetadataDataResponse'
              example:
                data:
                  id: 1
                  key: "uiPreferences"
                  value: "{\"theme\": \"light\", \"itemsPerPage\": 50}"
                  createdAt: 1757970298640
                  updatedAt: 1757970412888
                  deletedAt: null
                errors: null
                roundTripMs: 6
        '400':
          description: Invalid JSON value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: '(`secured` profile) the request is a GUEST showcase view (`X-Showcase`); metadata is read-only there'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Metadata not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Metadata
      summary: Delete metadata
      description: Soft delete a metadata entry by its unique key
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: Unique key for the metadata entry
      responses:
        '204':
          description: Metadata deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          description: '(`secured` profile) the request is a GUEST showcase view (`X-Showcase`); metadata is read-only there'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Metadata not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Bearer token authentication

  parameters:
    EntityId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int32
        minimum: 1
      description: Unique identifier for the entity

    ActAsOwner:
      name: X-Act-As-Owner
      in: header
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
      description: |
        Admin impersonation ("act as user"). When an **ADMIN** caller sends this header with a target user's id,
        the request is scoped to that user: Row-Level Security reads/writes the target's data and the capability
        matrix adopts the target's effective role (**full act-as** — e.g. impersonating a PAID user permits
        writes, a LAPSED user does not). The header is **ignored** for non-admin callers, for anonymous requests,
        and on the `/v1/admin/**` routes themselves (so an admin can't lock themselves out of the admin API). It
        applies to all tenant-scoped routes; `GET /v1/auth/me` reflects the resulting state via its
        `impersonating` field. Stop impersonating by no longer sending the header. When `X-Showcase` is also
        present it takes precedence over this header. Only meaningful under the `secured` profile.

    ShowcaseView:
      name: X-Showcase
      in: header
      required: false
      schema:
        type: string
        pattern: '^[a-z0-9](-?[a-z0-9])*$'
      example: seths-collection
      description: |
        View a public showcase. The value is a showcase **slug** (discover them via `GET /v1/showcases`); the
        request is scoped to that showcase owner's data as **GUEST** — read + filter only, so writes and backup
        return **403**. The header wins for **every** caller: authenticated users browse showcases without
        logging out (their own data is not visible while it is set), and it takes precedence over
        `X-Act-As-Owner`. A slug that does not exist — or whose owner does not currently derive to PAID/ADMIN
        (e.g. lapsed) — returns **404** (the cases are indistinguishable by design). Applies to all tenant-scoped
        routes under the `secured` profile; without it, anonymous requests resolve to the **default showcase**.

  schemas:
    # Authentication
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Unique login identifier for the account
        password:
          type: string
          format: password
          description: Plaintext password; stored only as a BCrypt hash
      required:
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
      required:
        - email
        - password

    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
          description: A valid, unrevoked refresh token previously issued by login or refresh
      required:
        - refreshToken

    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
          description: "Short-lived JWT to send as `Authorization: Bearer <accessToken>`"
        refreshToken:
          type: string
          description: Longer-lived, single-use, revocable token used to obtain a new access token
        tokenType:
          type: string
          example: "Bearer"
        expiresInMs:
          type: integer
          format: int64
          description: Lifetime of the access token in milliseconds

    AuthDataResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/AuthTokens'
        errors:
          type: 'null'
        roundTripMs:
          type: integer
          format: int64

    RegisteredUser:
      type: object
      properties:
        id:
          type: integer
          format: int32
        email:
          type: string
          format: email

    RegisterDataResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/RegisteredUser'
        errors:
          type: 'null'
        roundTripMs:
          type: integer
          format: int64

    CurrentUser:
      type: object
      properties:
        id:
          type: integer
          format: int32
          description: |
            The caller's id. While impersonating, this (and `email`/`role`) is the **admin's** identity; the
            impersonated user appears under `impersonating`.
        email:
          type: string
          format: email
        role:
          type: string
          enum: [GUEST, TRIAL, PAID, LAPSED, ADMIN]
          description: The caller's effective per-request role. Always `ADMIN` while impersonating.
        accessUntil:
          type: integer
          format: int64
          nullable: true
          description: |
            The caller's access-window expiry as epoch milliseconds, or `null` for no window (e.g. an
            admin-pinned account). This is the same `access_until` that drives the TRIAL/PAID/LAPSED derivation.
            While impersonating, this is the **admin's** window (matching the primary `id`/`email`/`role`).
        impersonating:
          nullable: true
          description: |
            Present (non-null) only when an admin is impersonating another user via the `X-Act-As-Owner` header.
            Carries the target user being acted as, so the front end can render that user's view while knowing an
            admin is driving. `null` for a normal request.
          allOf:
            - $ref: '#/components/schemas/ImpersonatedUser'

    ImpersonatedUser:
      type: object
      properties:
        id:
          type: integer
          format: int32
        email:
          type: string
          format: email
        role:
          type: string
          enum: [GUEST, TRIAL, PAID, LAPSED, ADMIN]
          description: The impersonated user's effective role (what that user sees in the app).

    MeDataResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/CurrentUser'
        errors:
          type: 'null'
        roundTripMs:
          type: integer
          format: int64

    # Common Components
    CustomFieldValue:
      type: object
      properties:
        customFieldId:
          type: integer
          description: ID of the custom field definition
        customFieldName:
          type: string
          description: Name of the custom field
        customFieldType:
          type: string
          enum: [text, number, boolean, dropdown, radio_button, progress_bar]
          description: Data type of the custom field
        value:
          type: string
          description: String representation of the field value
      required:
        - customFieldId
        - customFieldName
        - customFieldType
        - value

    FilterRequestDto:
      type: object
      properties:
        key:
          type: string
          enum: [toy, system, videoGame, videoGameBox, boardGame, boardGameBox]
          description: Entity type to filter
        field:
          type: string
          description: |
            Field name to filter or sort on. For sorting, set this to the actual column you want to
            order by (e.g. "name", "generation") together with the order_by/order_by_desc operator —
            do NOT use the "all_fields" placeholder here. "all_fields" only appears in the filter
            metadata to advertise that sorting is supported; sending it as a real sort field is
            rejected with a validation error.
        operator:
          type: string
          enum: [equals, not_equals, contains, starts_with, ends_with, greater_than, less_than, greater_than_equal_to, less_than_equal_to, since, before, order_by, order_by_desc, limit, offset]
          description: |
            Filter operator. Available operators depend on field type:
            - **Text fields**: equals, not_equals, contains, starts_with, ends_with
            - **Number fields**: equals, not_equals, greater_than, less_than, greater_than_equal_to, less_than_equal_to
            - **Boolean fields**: equals
            - **Time fields**: since, before
            - **System fields**: equals, not_equals (for system_id on video games and video game boxes)
            - **Sort fields**: order_by, order_by_desc — multiple sort filters are allowed and applied in the order they appear in the request array (first = primary sort, second = tiebreaker, etc.)
            - **Pagination fields**: limit, offset
        operand:
          type: string
          description: |
            Value to filter by. Format depends on field type:
            - **Text**: Any string value
            - **Number**: Numeric string (e.g., "123")
            - **Boolean**: "true" or "false"
            - **Time**: ISO datetime string (e.g., "2023-01-01T00:00:00")
            - **System**: System ID as string (e.g., "1")
            - **Sort (order_by, order_by_desc)**: operand is ignored; the column to sort by comes from the field
      required:
        - key
        - field
        - operator
        - operand

    FilterRequest:
      type: object
      properties:
        filters:
          type: array
          items:
            $ref: '#/components/schemas/FilterRequestDto'
          description: Array of filters to apply
      required:
        - filters

    # Base Entity Schemas
    EntityTimestamps:
      type: object
      properties:
        createdAt:
          type: integer
          format: int64
          description: When the entity was created, as epoch milliseconds
          example: 1757970298640
        updatedAt:
          type: integer
          format: int64
          description: When the entity was last updated, as epoch milliseconds
          example: 1757970298640
        deletedAt:
          type: integer
          format: int64
          nullable: true
          description: When the entity was soft-deleted, as epoch milliseconds (null if not deleted)
          example: null

    # Toy Schemas
    ToyRequest:
      type: object
      properties:
        name:
          type: string
          description: Name of the toy
          minLength: 1
        set:
          type: string
          description: Set or series the toy belongs to
        customFieldValues:
          type: array
          items:
            $ref: '#/components/schemas/CustomFieldValue'
          description: Custom field values for this toy
      required:
        - name
        - set
        - customFieldValues

    ToyResponse:
      allOf:
        - type: object
          properties:
            key:
              type: string
              enum: [toy]
              description: Entity type identifier
            id:
              type: integer
              description: Unique identifier
        - $ref: '#/components/schemas/ToyRequest'
        - $ref: '#/components/schemas/EntityTimestamps'

    ToyDataResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ToyResponse'
        errors:
          type: 'null'
        roundTripMs:
          type: integer
          format: int64
          description: Server-side processing time in milliseconds
          example: 9

    # System Schemas
    SystemRequest:
      type: object
      properties:
        name:
          type: string
          description: Name of the gaming system
          minLength: 1
        generation:
          type: integer
          description: Console generation number
        handheld:
          type: boolean
          description: Whether this is a handheld system
        customFieldValues:
          type: array
          items:
            $ref: '#/components/schemas/CustomFieldValue'
          description: Custom field values for this system
      required:
        - name
        - generation
        - handheld
        - customFieldValues

    SystemResponse:
      allOf:
        - type: object
          properties:
            key:
              type: string
              enum: [system]
              description: Entity type identifier
            id:
              type: integer
              description: Unique identifier
        - $ref: '#/components/schemas/SystemRequest'
        - $ref: '#/components/schemas/EntityTimestamps'

    SystemDataResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/SystemResponse'
        errors:
          type: 'null'
        roundTripMs:
          type: integer
          format: int64
          description: Server-side processing time in milliseconds
          example: 9

    # Video Game Schemas
    VideoGameRequest:
      type: object
      properties:
        title:
          type: string
          description: Title of the video game
          minLength: 1
        systemId:
          type: integer
          description: ID of the gaming system this game runs on
        customFieldValues:
          type: array
          items:
            $ref: '#/components/schemas/CustomFieldValue'
          description: Custom field values for this video game
      required:
        - title
        - systemId
        - customFieldValues

    SlimVideoGame:
      allOf:
        - type: object
          properties:
            id:
              type: integer
              description: Unique identifier
            title:
              type: string
              description: Title of the video game
            system:
              $ref: '#/components/schemas/SystemResponse'
        - $ref: '#/components/schemas/EntityTimestamps'
        - type: object
          properties:
            customFieldValues:
              type: array
              items:
                $ref: '#/components/schemas/CustomFieldValue'

    SlimVideoGameBox:
      description: |
        A video game box as it appears nested inside a video game response. Note that the boolean
        flags here are serialized as `physical` and `collection` (without the `is` prefix used by the
        top-level VideoGameBoxResponse). It does not repeat the contained video game ids.
      allOf:
        - type: object
          properties:
            id:
              type: integer
              description: Unique identifier of the video game box
            title:
              type: string
              description: Title of the video game box
            system:
              $ref: '#/components/schemas/SystemResponse'
            physical:
              type: boolean
              description: Whether this is a physical copy
            collection:
              type: boolean
              description: Whether this box contains multiple games
        - $ref: '#/components/schemas/EntityTimestamps'
        - type: object
          properties:
            customFieldValues:
              type: array
              items:
                $ref: '#/components/schemas/CustomFieldValue'

    VideoGameResponse:
      allOf:
        - type: object
          properties:
            key:
              type: string
              enum: [videoGame]
              description: Entity type identifier
            id:
              type: integer
              description: Unique identifier
            title:
              type: string
              description: Title of the video game
            system:
              $ref: '#/components/schemas/SystemResponse'
            videoGameBoxes:
              type: array
              description: Every box that contains this video game
              items:
                $ref: '#/components/schemas/SlimVideoGameBox'
        - $ref: '#/components/schemas/EntityTimestamps'
        - type: object
          properties:
            customFieldValues:
              type: array
              items:
                $ref: '#/components/schemas/CustomFieldValue'

    VideoGameDataResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/VideoGameResponse'
        errors:
          type: 'null'
        roundTripMs:
          type: integer
          format: int64
          description: Server-side processing time in milliseconds
          example: 9

    # Video Game Box Schemas
    VideoGameBoxRequest:
      type: object
      properties:
        title:
          type: string
          description: Title of the video game box
          minLength: 1
        systemId:
          type: integer
          description: ID of the gaming system
        existingVideoGameIds:
          type: array
          items:
            type: integer
          description: IDs of existing video games to include
        newVideoGames:
          type: array
          items:
            $ref: '#/components/schemas/VideoGameRequest'
          description: New video games to create and include
        isPhysical:
          type: boolean
          description: Whether this is a physical copy
        customFieldValues:
          type: array
          items:
            $ref: '#/components/schemas/CustomFieldValue'
          description: Custom field values for this video game box
      required:
        - title
        - systemId
        - existingVideoGameIds
        - newVideoGames
        - isPhysical
        - customFieldValues

    VideoGameBoxResponse:
      allOf:
        - type: object
          properties:
            key:
              type: string
              enum: [videoGameBox]
              description: Entity type identifier
            id:
              type: integer
              description: Unique identifier
            title:
              type: string
              description: Title of the video game box
            system:
              $ref: '#/components/schemas/SystemResponse'
            videoGames:
              type: array
              items:
                $ref: '#/components/schemas/SlimVideoGame'
            isPhysical:
              type: boolean
              description: Whether this is a physical copy
            isCollection:
              type: boolean
              description: Whether this box contains multiple games
        - $ref: '#/components/schemas/EntityTimestamps'
        - type: object
          properties:
            customFieldValues:
              type: array
              items:
                $ref: '#/components/schemas/CustomFieldValue'

    VideoGameBoxDataResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/VideoGameBoxResponse'
        errors:
          type: 'null'
        roundTripMs:
          type: integer
          format: int64
          description: Server-side processing time in milliseconds
          example: 9

    # Board Game Schemas
    BoardGameRequest:
      type: object
      properties:
        title:
          type: string
          description: Title of the board game
          minLength: 1
        customFieldValues:
          type: array
          items:
            $ref: '#/components/schemas/CustomFieldValue'
          description: Custom field values for this board game
      required:
        - title
        - customFieldValues

    SlimBoardGameBox:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier of the board game box
        title:
          type: string
          description: Title of the board game box

    SlimBoardGame:
      allOf:
        - type: object
          properties:
            id:
              type: integer
              description: Unique identifier of the board game
            title:
              type: string
              description: Title of the board game
        - $ref: '#/components/schemas/EntityTimestamps'
        - type: object
          properties:
            customFieldValues:
              type: array
              items:
                $ref: '#/components/schemas/CustomFieldValue'
              description: Custom field values for this board game

    BoardGameResponse:
      allOf:
        - type: object
          properties:
            key:
              type: string
              enum: [boardGame]
              description: Entity type identifier
            id:
              type: integer
              description: Unique identifier
            title:
              type: string
              description: Title of the board game
            boardGameBoxes:
              type: array
              items:
                $ref: '#/components/schemas/SlimBoardGameBox'
              description: Boxes containing this board game
        - $ref: '#/components/schemas/EntityTimestamps'
        - type: object
          properties:
            customFieldValues:
              type: array
              items:
                $ref: '#/components/schemas/CustomFieldValue'

    BoardGameDataResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/BoardGameResponse'
        errors:
          type: 'null'
        roundTripMs:
          type: integer
          format: int64
          description: Server-side processing time in milliseconds
          example: 9

    # Board Game Box Schemas
    BoardGameBoxRequest:
      type: object
      properties:
        title:
          type: string
          description: Title of the board game box
          minLength: 1
        isExpansion:
          type: boolean
          description: Whether this is an expansion
        isStandAlone:
          type: boolean
          description: Whether this can be played standalone
        baseSetId:
          type: integer
          nullable: true
          description: ID of the base set if this is an expansion
        boardGameId:
          type: integer
          nullable: true
          description: ID of existing board game to use
        boardGame:
          $ref: '#/components/schemas/BoardGameRequest'
          nullable: true
          description: New board game to create (if boardGameId is null)
        customFieldValues:
          type: array
          items:
            $ref: '#/components/schemas/CustomFieldValue'
          description: Custom field values for this board game box
      required:
        - title
        - isExpansion
        - isStandAlone
        - customFieldValues

    BoardGameBoxUpdateRequest:
      type: object
      properties:
        title:
          type: string
          description: Title of the board game box
          minLength: 1
        isExpansion:
          type: boolean
          description: Whether this is an expansion
        isStandAlone:
          type: boolean
          description: Whether this can be played standalone
        baseSetId:
          type: integer
          nullable: true
          description: ID of the base set if this is an expansion
        boardGameId:
          type: integer
          description: ID of existing board game (required for updates)
          minimum: 1
        customFieldValues:
          type: array
          items:
            $ref: '#/components/schemas/CustomFieldValue'
          description: Custom field values for this board game box
      required:
        - title
        - isExpansion
        - isStandAlone
        - boardGameId
        - customFieldValues

    BoardGameBoxResponse:
      allOf:
        - type: object
          properties:
            key:
              type: string
              enum: [boardGameBox]
              description: Entity type identifier
            id:
              type: integer
              description: Unique identifier
            title:
              type: string
              description: Title of the board game box
            isExpansion:
              type: boolean
              description: Whether this is an expansion
            isStandAlone:
              type: boolean
              description: Whether this can be played standalone
            baseSetId:
              type: integer
              nullable: true
              description: ID of the base set if this is an expansion
            boardGame:
              $ref: '#/components/schemas/SlimBoardGame'
        - $ref: '#/components/schemas/EntityTimestamps'
        - type: object
          properties:
            customFieldValues:
              type: array
              items:
                $ref: '#/components/schemas/CustomFieldValue'

    BoardGameBoxDataResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/BoardGameBoxResponse'
        errors:
          type: 'null'
        roundTripMs:
          type: integer
          format: int64
          description: Server-side processing time in milliseconds
          example: 9

    # Custom Field Schemas
    CustomFieldOption:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier for the option
        customFieldId:
          type: integer
          description: ID of the parent custom field
        name:
          type: string
          description: Display name of the option
        isDefault:
          type: boolean
          description: Whether this is the default option for the field
        order:
          type: integer
          description: Display order for the option
      required:
        - id
        - customFieldId
        - name
        - isDefault
        - order

    CustomFieldRequest:
      type: object
      properties:
        name:
          type: string
          description: Name of the custom field
          minLength: 1
        type:
          type: string
          enum: [text, number, boolean, dropdown, radio_button, progress_bar]
          description: |
            Data type of the custom field.
            Enum types (dropdown, radio_button, progress_bar) require at least one entry in the `options` list.
        entityKey:
          type: string
          enum: [toy, system, videoGame, videoGameBox, boardGame, boardGameBox]
          description: Entity type this field applies to
        options:
          type: array
          description: |
            Initial options for enum-type fields (dropdown, radio_button, progress_bar).
            Required and must contain at least one entry when `type` is an enum type.
            Exactly one option must have isDefault set to true.
            Ignored for non-enum types.
          items:
            type: object
            properties:
              name:
                type: string
                description: Display name of the option
              order:
                type: integer
                description: Display order for the option
              isDefault:
                type: boolean
                description: Whether this is the default option; exactly one must be true
            required:
              - name
              - order
              - isDefault
          example:
            - name: "Option A"
              order: 0
              isDefault: true
            - name: "Option B"
              order: 1
              isDefault: false
      required:
        - name
        - type
        - entityKey

    CustomFieldResponse:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier
        name:
          type: string
          description: Name of the custom field
        type:
          type: string
          enum: [text, number, boolean, dropdown, radio_button, progress_bar]
          description: Data type of the custom field
        entityKey:
          type: string
          description: Entity type this field applies to
        order:
          type: integer
          description: Display order for the custom field
        options:
          type: array
          items:
            $ref: '#/components/schemas/CustomFieldOption'
          description: Options for enum-type fields. Always present; empty list for non-enum types.

    CustomFieldDataResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/CustomFieldResponse'
        errors:
          type: 'null'
        roundTripMs:
          type: integer
          format: int64
          description: Server-side processing time in milliseconds
          example: 9

    # Filter Specification Schema
    FilterSpecification:
      type: object
      properties:
        type:
          type: string
          description: Filter type name
        fields:
          type: object
          additionalProperties:
            type: string
          description: |
            Map of field names to their data types. Possible types include:
            - **text**: String fields supporting text operations
            - **number**: Numeric fields supporting comparison operations
            - **boolean**: Boolean fields supporting equality operations
            - **time**: Timestamp fields supporting temporal operations
            - **system**: System ID fields supporting equality operations (video games and video game boxes only)
            - **sort**: Marker ("all_fields") advertising that result ordering is supported. To sort, send order_by/order_by_desc with an actual column in the field — not "all_fields" itself.
            - **pagination**: Special field for result limiting
        filters:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: |
            Map of field names to available operators:
            - **Text fields**: ["equals", "not_equals", "contains", "starts_with", "ends_with"]
            - **Number fields**: ["equals", "not_equals", "greater_than", "less_than", "greater_than_equal_to", "less_than_equal_to"]
            - **Boolean fields**: ["equals"]
            - **Time fields**: ["since", "before"]
            - **System fields**: ["equals", "not_equals"]
            - **Sort fields**: ["order_by", "order_by_desc"] — multiple sort filters may be combined; order in the request array determines priority
            - **Pagination fields**: ["limit", "offset"]
      example:
        type: "videoGame"
        fields:
          title: "text"
          system_id: "system"
          created_at: "time"
          updated_at: "time"
          all_fields: "sort"
          pagination_fields: "pagination"
        filters:
          title: ["equals", "not_equals", "contains", "starts_with", "ends_with"]
          system_id: ["equals", "not_equals"]
          created_at: ["since", "before"]
          updated_at: ["since", "before"]
          all_fields: ["order_by", "order_by_desc"]
          pagination_fields: ["limit", "offset"]

    # Admin Schemas
    AdminUser:
      type: object
      description: A user account as exposed to the admin role-management API.
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
          enum: [GUEST, TRIAL, PAID, LAPSED, ADMIN]
          description: The user's effective per-request role (already reflects any role override).
        roleOverride:
          type: string
          enum: [GUEST, TRIAL, PAID, LAPSED, ADMIN]
          nullable: true
          description: The admin pin, or null when the role is auto-derived.
        accessUntil:
          type: integer
          format: int64
          nullable: true
          description: Access window expiry as epoch milliseconds, or null for no window.
        subscriptionStatus:
          type: string
          nullable: true
          description: "Informational billing status (e.g. trialing, active, past_due), or null."
        showcaseSlug:
          type: string
          nullable: true
          pattern: '^[a-z0-9](-?[a-z0-9])*$'
          description: The user's public showcase address, or null when their collection is private. Visible to viewers only while the user derives to PAID/ADMIN.
        showcaseName:
          type: string
          nullable: true
          description: The showcase's public display title, or null.

    SetRoleOverrideRequest:
      type: object
      properties:
        roleOverride:
          type: string
          enum: [GUEST, TRIAL, PAID, LAPSED, ADMIN]
          nullable: true
          description: The role to pin the user to, or null to clear the pin and revert to auto-derivation. At most one account may be pinned ADMIN (400 otherwise).

    SetShowcaseRequest:
      type: object
      properties:
        slug:
          type: string
          nullable: true
          pattern: '^[a-z0-9](-?[a-z0-9])*$'
          description: The public address to grant (lowercase alphanumerics, single interior hyphens; unique across users), or null/blank to clear the grant.
        name:
          type: string
          nullable: true
          description: The display title shown by the public directory in place of the owner's email. Cleared along with the slug.

    Showcase:
      type: object
      description: One visible public showcase, as listed by the directory. Deliberately excludes owner emails and every other account field.
      properties:
        slug:
          type: string
          description: The showcase's address — pass it in the `X-Showcase` header to browse the collection.
        name:
          type: string
          nullable: true
          description: The showcase's public display title.

    # Data Management Schemas
    BackupData:
      type: object
      properties:
        customFields:
          type: array
          items:
            $ref: '#/components/schemas/CustomFieldResponse'
        toys:
          type: array
          items:
            $ref: '#/components/schemas/ToyResponse'
        systems:
          type: array
          items:
            $ref: '#/components/schemas/SystemResponse'
        videoGameBoxes:
          type: array
          items:
            $ref: '#/components/schemas/VideoGameBoxResponse'
        boardGameBoxes:
          type: array
          items:
            $ref: '#/components/schemas/BoardGameBoxResponse'
        metadata:
          type: array
          items:
            $ref: '#/components/schemas/MetadataResponse'
          description: Metadata entries included in the backup

    ImportResults:
      type: object
      description: |
        The `data` payload of the import/seed endpoints: a flat tally of how many records of each
        type already existed (and were skipped) versus how many were created. It does **not** contain
        an error field — any per-record import failures are reported in the envelope's top-level
        `errors` array (which is an empty array `[]` when everything imported cleanly).
      properties:
        existingCustomFields:
          type: integer
          description: Number of existing custom fields found (skipped)
        createdCustomFields:
          type: integer
          description: Number of custom fields created
        existingToys:
          type: integer
          description: Number of existing toys found (skipped)
        createdToys:
          type: integer
          description: Number of toys created
        existingSystems:
          type: integer
          description: Number of existing systems found (skipped)
        createdSystems:
          type: integer
          description: Number of systems created
        existingVideoGameBoxes:
          type: integer
          description: Number of existing video game boxes found (skipped)
        createdVideoGameBoxes:
          type: integer
          description: Number of video game boxes created
        existingBoardGameBoxes:
          type: integer
          description: Number of existing board game boxes found (skipped)
        createdBoardGameBoxes:
          type: integer
          description: Number of board game boxes created
        existingMetadata:
          type: integer
          description: Number of existing metadata entries found (skipped)
        createdMetadata:
          type: integer
          description: Number of metadata entries created

    # Metadata Schemas
    MetadataRequest:
      type: object
      properties:
        id:
          type: integer
          nullable: true
          description: Unique identifier (null for new entries)
        key:
          type: string
          description: Unique key for the metadata entry
          minLength: 1
        value:
          type: string
          description: JSON value as string (must be parseable as valid JSON, e.g. an object, array, or quoted string)
        createdAt:
          type: integer
          format: int64
          nullable: true
          description: Creation timestamp as epoch milliseconds (auto-generated; send null on create)
          example: null
        updatedAt:
          type: integer
          format: int64
          nullable: true
          description: Update timestamp as epoch milliseconds (auto-generated; send null on create)
          example: null
        deletedAt:
          type: integer
          format: int64
          nullable: true
          description: Deletion timestamp as epoch milliseconds (null if not deleted)
          example: null
      required:
        - key
        - value

    MetadataResponse:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier
        key:
          type: string
          description: Unique key for the metadata entry
        value:
          type: string
          description: |
            JSON value as a string. The stored value is the request value re-serialized, so whitespace
            may be normalized (e.g. a key/value gains a space after the colon) compared to what was sent.
        createdAt:
          type: integer
          format: int64
          description: When the metadata was created, as epoch milliseconds
          example: 1757970298640
        updatedAt:
          type: integer
          format: int64
          description: When the metadata was last updated, as epoch milliseconds
          example: 1757970298640
        deletedAt:
          type: integer
          format: int64
          nullable: true
          description: When the metadata was soft-deleted, as epoch milliseconds (null if not deleted)
          example: null
      required:
        - id
        - key
        - value
        - createdAt
        - updatedAt

    MetadataDataResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/MetadataResponse'
        errors:
          type: 'null'
        roundTripMs:
          type: integer
          format: int64
          description: Server-side processing time in milliseconds
          example: 9

    # Response Schemas
    SuccessResponse:
      type: object
      description: |
        Envelope returned for actions with no entity payload (e.g. deletes). `data` is an
        empty string for successful deletes.
      properties:
        data:
          type: string
          example: ""
        errors:
          type: 'null'
        roundTripMs:
          type: integer
          format: int64
          description: Server-side processing time in milliseconds
          example: 7

    ErrorResponse:
      type: object
      description: |
        Returned for any failed request. `data` is null and `errors` is an array of human-readable
        message strings — one entry per problem detected. Note there is no `roundTripMs` field on errors.
      properties:
        data:
          type: 'null'
        errors:
          type: array
          items:
            type: string
          description: One or more error message strings
      example:
        data: null
        errors:
          - "title cannot be blank"
          - "systemId must be a positive integer"

tags:
  - name: System
    description: Health check and system status endpoints
  - name: Authentication
    description: Account registration, login, and token refresh (public; required only under the secured profile)
  - name: Toys
    description: Manage toy collectibles
  - name: Systems
    description: Manage gaming systems and platforms
  - name: Video Games
    description: Manage individual video games
  - name: Video Game Boxes
    description: Manage video game box collections
  - name: Board Games
    description: Manage individual board games
  - name: Board Game Boxes
    description: Manage board game box collections
  - name: Custom Fields
    description: Manage custom metadata fields
  - name: Metadata
    description: Manage arbitrary JSON metadata by key
  - name: Filters
    description: Get filtering capabilities for entities
  - name: Data Management
    description: Backup, import, and data seeding operations
  - name: Admin
    description: Admin-only account management (list users, set/clear a user's role override, grant/clear a public showcase); requires the ADMIN role
  - name: Showcases
    description: The public showcase directory (no authentication required)