  /v1/videoGameBoxes/{id}:
    get:
      tags:
        - Video Game Boxes
      summary: Get a video game box by ID
      parameters:
        - $ref: '#/components/parameters/EntityId'
      responses:
        '200':
          description: Video game box found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoGameBoxDataResponse'
        '404':
          description: Video game box not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Video Game Boxes
      summary: Update a video game box
      description: |
        Update a video game box and reconcile the set of games it contains. Game membership is
        reconciled the same way it is created: `existingVideoGameIds` lists games already in the
        database that should belong to this box, and `newVideoGames` creates additional games inline.

        Reconciliation semantics:
        - `existingVideoGameIds` is the **authoritative, full set** of pre-existing games for this
          box — not a delta. Any game currently in the box but omitted from this array is removed
          from this box.
        - Removing a game from this box **only unlinks it from this box**. Video games can belong to
          more than one box (multi-box membership); if a removed game still belongs to other boxes it
          is preserved, and those other associations are left untouched.
        - A game that ends up referenced by **no** box is deleted from the database. A subsequent
          `GET /v1/videoGames/{id}` for that game then returns `404 Not Found` — the game is never
          left in a boxless or malformed state.
        - A box must always contain at least one game: across `existingVideoGameIds` and
          `newVideoGames` at least one game must be present. An update that would empty the box is
          rejected with `400 Bad Request`.
      parameters:
        - $ref: '#/components/parameters/EntityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                videoGameBox:
                  $ref: '#/components/schemas/VideoGameBoxRequest'
              required:
                - videoGameBox
      responses:
        '200':
          description: Video game box updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoGameBoxDataResponse'
        '400':
          description: |
            Invalid input data — for example a request that leaves the box with no games (no entries
            across `existingVideoGameIds` and `newVideoGames`), or otherwise fails validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Video game box not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Video Game Boxes
      summary: Delete a video game box
      parameters:
        - $ref: '#/components/parameters/EntityId'
      responses:
        '204':
          description: Video game box deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: Video game box not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

