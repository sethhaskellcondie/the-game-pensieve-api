                    type: integer
                    format: int64
        '409':
          description: An import is already in progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/function/seedMyCollection:
    post:
      tags:
        - Data Management
      summary: Seed database with personal collection data
      description: |
        Populate the database from the bundled `myCollection.json` file (the author's personal
        collection). Behaves like an import: idempotent, returns an `ImportResults` tally, surfaces
        per-record failures in the envelope's `errors` array, and returns 409 if an import is already
        in progress.
      responses:
        '200':
          description: Personal collection data seeded successfully (import results tally)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ImportResults'
                  errors:
                    type: array
                    items:
                      type: string
