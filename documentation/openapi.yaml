openapi: 3.0.3
info:
  title: The Game Pensieve API
  description: |
    The Game Pensieve is a comprehensive collection management system for gaming items including toys, video games, board games, and gaming systems. 
    
    This API provides full CRUD operations for managing your gaming collection with support for custom fields, advanced filtering, and data backup/import functionality.

    ## Response Format
    Every **successful** response is wrapped in a consistent envelope:
    ```json
    {
      "data": <response_data>,
      "errors": null,
      "roundTripMs": 12
    }
    ```
    - `data` — the payload (an object, an array, or an empty string `""` for deletes). `null` on error.
    - `errors` — always `null` on success.
    - `roundTripMs` — server-side processing time in milliseconds, measured from request receipt to response. Present only on successful responses produced by the controllers; it is **absent** from error responses.

    ## Error Format
    Errors do **not** include `roundTripMs`. `data` is `null` and `errors` is always an **array of strings** (one entry per problem found — a single request can report several validation errors at once):
    ```json
    {
      "data": null,
      "errors": ["title cannot be blank", "systemId must be a positive integer"]
    }
    ```
    Status codes used:
    - **400 Bad Request** — input/validation failure (blank required field, malformed entity, invalid custom field value, duplicate that violates a uniqueness rule, invalid filter). Also returned when registering an email that already has an account.
    - **401 Unauthorized** — authentication failed or is missing. Returned only when the API is running with the `secured` profile: a protected route was called without a valid `Bearer` access token, or `/v1/auth/login`/`/v1/auth/refresh` were given bad credentials or an invalid/expired refresh token. In the default (unsecured) build no route requires authentication and 401 is never returned.
    - **402 Payment Required** — (`secured` profile only) a role lacking the **FILTER** capability sent a **filtered** `/{entity}/function/search` request. In practice this is a **LAPSED** account: it may still list its own data with an empty `filters` array, but any non-empty filter needs an active subscription. See *Roles & Capabilities* below.
    - **403 Forbidden** — (`secured` profile only) the caller's role lacks the capability for the action: a **WRITE** (create/update/delete), a **BACKUP** (`/v1/function/backup`), an **IMPORT** (`/v1/function/import`, `/importFromFile`, `/seedSampleData`, `/seedMyCollection`), or **admin** access (`/v1/admin/**` by a non-ADMIN caller). Anonymous callers are rejected earlier with **401**. See *Roles & Capabilities* below.
    - **404 Not Found** — the requested resource (or an unknown route) does not exist. Also returned when an `X-Showcase` header names a slug that does not exist **or is not currently visible** (its owner is not PAID/ADMIN) — the two cases are deliberately indistinguishable.
    - **409 Conflict** — an import is already in progress (the import endpoints take a global lock).
    - **500 Internal Server Error** — an unexpected error; the array contains a generic message followed by the underlying exception message.
    - **200 OK with populated `errors`** — the backup/import endpoints report partial failures here: the import still returns HTTP 200, but `errors` lists the records that could not be processed. Always inspect `errors` on these endpoints even on a 200.

    ## Data Ownership & Multi-Tenancy
    All collection data (systems, toys, video games and boxes, board games and boxes, custom fields and their options/values, and metadata) is **owned by a single account and isolated per owner**. Ownership is enforced in the database with PostgreSQL Row-Level Security, so a request can only ever read or write the caller's own rows — the isolation holds even against direct SQL.
    - **Secured build** (`secured` profile): the owner is the authenticated user (from the `Bearer` token). Reads, searches, and writes are automatically scoped to that user; another owner's records are invisible (a read by id returns **404**, and they never appear in list/search results). Ownership is assigned by the server on create — there is no `owner` field in any request or response body. **Showcase** data is world-readable: under the secured profile the read surface — `GET /v1/{entity}/{id}`, `POST /v1/{entity}/function/search`, `GET /v1/filters/{entity}`, the custom-field definitions (`GET /v1/custom_fields/entity/{key}` and `GET /v1/custom_fields`), and four metadata keys (`GET /v1/metadata/{ui-settings, default_sort_options, saved-filters, saved-filter-categories}`) — is reachable **without a token** (anonymous requests resolve to the **default showcase** owner); writes always require authentication.
    - **Default (unsecured) build**: anonymous requests resolve to the single seeded, world-readable **default showcase** owner, preserving the original single-collection behavior for the public site. The showcase owner's records are **not** visible to an authenticated user — each user sees only their own.
    - Metadata keys are unique **per owner** (two owners may each use the same key).

    ## Public Showcases (secured profile)
    A **showcase is a paid user's own collection made public** — there is no separate "showcase data". The admin grants one via `POST /v1/admin/users/{id}/showcase`, which sets the user's unique **slug** (the public address and the entitlement, one column) and a display **name**. A slug **resolves only while its owner derives to PAID or ADMIN**: a lapsed owner's slug stays reserved but its showcase answers **404** until they renew.
    - **Switch showcases with the `X-Showcase: <slug>` request header** on the tenant-scoped routes. The header wins for **every** caller — even authenticated ones, and over `X-Act-As-Owner` — and is always **GUEST-scoped**: read + filter only (writes/backup → **403**); an unknown or not-visible slug → **404**. Anonymous requests without the header keep resolving to the **default showcase** (the seeded row, slug `seths-collection`).
    - **`GET /v1/showcases`** is a public directory of all currently visible showcases (`{slug, name}` only — never emails), backing a front-end switcher.

    ## Roles & Capabilities (secured profile)
    Under the `secured` profile, each request resolves to one of five **roles**, derived per request from backend fields on the account (never from a payment processor): an admin **role override** if set, otherwise the account's `access_until` / `subscription_status`. A new account is auto-granted a **trial** on registration (a configurable window, default 30 days), so it starts as **TRIAL** and becomes **LAPSED** automatically when the window ends. An operator can pin any account's role through the admin API (`POST /v1/admin/users/{id}/role`) — but **at most one account may be pinned ADMIN** (a partial unique index enforces it; pinning a second returns **400**). To bootstrap the admin, claim the seeded default-showcase row: `UPDATE users SET email='you@domain.com', password_hash='<bcrypt>', role_override='ADMIN' WHERE is_public_showcase;` (see `documentation/Notes.md` for the full hash-minting procedure).
    - **GUEST** (anonymous, or any caller viewing a showcase via `X-Showcase`): reads and filters the resolved **showcase** data only; writes/backup/import are rejected (anonymous → **401** at authentication, authenticated showcase views → **403** by capability).
    - **TRIAL** (new account, trial window active): full read, filter, write, and backup of its own data; **import is paid-only (403)**.
    - **PAID** (authenticated, active subscription): full read, filter, write, backup, and import of its own data.
    - **LAPSED** (authenticated, access window expired): may read/list its own data and back it up, but a **filtered** search returns **402** and write/import return **403**.
    - **ADMIN** (pinned via `role_override`; exactly one — the operator): every own-data capability plus the admin role/showcase-management API. The admin owns the default showcase and edits it as their own collection.

    Capability matrix (✓ = allowed; the denied response is in parentheses):

    | Capability | GUEST | TRIAL | PAID | LAPSED | ADMIN |
    |---|:--:|:--:|:--:|:--:|:--:|
    | READ (own/showcase) | ✓ | ✓ | ✓ | ✓ | ✓ |
    | FILTER (402) | ✓* | ✓ | ✓ | ✗ | ✓ |
    | WRITE (403) | ✗ | ✓ | ✓ | ✗ | ✓ |
    | BACKUP (403) | ✗ | ✓ | ✓ | ✓ | ✓ |
    | IMPORT (403) | ✗ | ✗ | ✓ | ✗ | ✓ |
    | ACCESS&#95;ADMIN (403) | ✗ | ✗ | ✗ | ✗ | ✓ |

    `*` GUEST reads/filters whichever **showcase** the request resolves to — the default showcase for anonymous no-header requests, or the one named by `X-Showcase` (RLS scopes the request to that owner). Anonymous writes/backup/import are blocked at authentication (**401**) before capabilities apply; on an authenticated showcase view they are **403**.

    **Impersonation:** an `X-Act-As-Owner: <userId>` header, honored only for an ADMIN caller, scopes the request to that user with **full act-as** semantics — the capability matrix adopts the target's effective role, so writes are permitted exactly when the target could write (this is deliberately *not* a read-only clamp; see the `X-Act-As-Owner` parameter). When `X-Showcase` is also present, **`X-Showcase` wins**: an explicit read-only showcase view, GUEST-scoped.

    ## Timestamps
    All `createdAt`, `updatedAt`, and `deletedAt` fields are serialized as **epoch milliseconds** (a JSON integer, e.g. `1757970298640`), not ISO-8601 strings. `deletedAt` is `null` for records that have not been soft-deleted. This applies uniformly to entities, custom fields, metadata, and backup exports.

    ## Entity Relationships
    - **Systems** are gaming platforms (Nintendo Switch, PlayStation, NES, etc.).
    - **Video Games** belong to a System and are contained by one or more **Video Game Boxes**. Video games are never created on their own — they are created through a Video Game Box (`newVideoGames`) or linked to one by id (`existingVideoGameIds`). There is no `POST /v1/videoGames`; only GET, PUT (update), and search exist.
    - **Video Game Boxes** belong to a System and contain one or more Video Games. A box with more than one game has `isCollection: true`.
    - **Board Games** are the underlying game; **Board Game Boxes** are the physical boxes that contain exactly one Board Game. Like video games, board games are never created directly — they are created through a Board Game Box (`boardGame`) or linked by id (`boardGameId`). There is no `POST /v1/boardGames`; only GET, PUT (update), and search exist.
    - **Toys** are standalone collectibles.
    - **Custom Fields** define typed, reusable metadata fields scoped to one entity type. Each entity carries a `customFieldValues` array holding its values.
    - **Metadata** is arbitrary JSON stored under a unique string key, independent of the collection entities.

    ## Custom Field Values
    Every entity request and response carries a `customFieldValues` array. Each entry is `{ customFieldId, customFieldName, customFieldType, value, valueOptionId }` where `value` is **always a string**, regardless of the field's type — `"true"`/`"false"` for booleans, `"2006"` for numbers. On creation you may send `customFieldId: 0` as a placeholder when the value is keyed by `customFieldName`; the server returns the resolved id in the response.

    For **enum** types (`dropdown`, `radio_button`, `progress_bar`) the selected option is stored as a reference to an option id. On **write** send `valueOptionId` set to the chosen option's id (the `value` text is ignored and derived by the server). On **read** the response returns both `valueOptionId` (the option id) and `value` (the option's current text). Because the value is a reference, renaming an option is automatically reflected in existing values. For all non-enum types `valueOptionId` is `null`.

    ### Updating values (partial upsert)
    On an entity `PUT`, the `customFieldValues` array is applied as a **partial upsert keyed by `customFieldId`**: each entry you include is created or updated, and any value you **omit is left unchanged** — an update never deletes a value. This means you can update a single custom field by sending **only that one entry** in `customFieldValues`; you do **not** need to send the entity's full set of values. The response always returns the entity's complete, current set of values regardless of how many you sent.

    Two consequences for clients:
    - **Do not send placeholder entries for values that have no selection yet — omit them.** In particular, an enum entry with `valueOptionId: null` is **rejected with a 400** (`valueOptionId` must reference a valid option of that field). To leave an enum field unset, simply leave it out of the array.
    - **There is currently no way to clear a value once set.** Omitting an entry keeps its existing stored value; it does not remove it. (Changing the selection is supported — send the entry with the new `valueOptionId`.)

    ## Filter System
    The API provides advanced filtering capabilities through the `/{entity}/function/search` endpoints. Call `GET /v1/filters/{entity}` first to discover the fields and operators available for an entity. Operators by field type:
    - **Text filters**: equals, not_equals, contains, starts_with, ends_with
    - **Number filters**: equals, not_equals, greater_than, less_than, greater_than_equal_to, less_than_equal_to
    - **Boolean filters**: equals
    - **Time filters**: since, before (operand is epoch milliseconds or an ISO datetime string)
    - **System filters**: equals, not_equals (for `system_id` on video games and video game boxes)
    - **Enum custom field filters** (`dropdown`, `radio_button`, `progress_bar`): equals, not_equals, order_by, order_by_desc — for equals/not_equals the operand is the selected option's id (a whole number). These fields filter by option id (like system filters), so they support no text matching (contains/starts_with/ends_with). Sorting **is** supported: `order_by`/`order_by_desc` order rows by the selected option's display order (the order the options were arranged in), not by option id, so values sort in their logical user-defined order.
    - **Custom field filters**: filter on a custom field by sending its field metadata (custom fields surface as filterable fields for their entity)
    - **Sort and Pagination**: order_by, order_by_desc, limit, offset — multiple sort filters are supported and applied in request order (first = primary sort, second = tiebreaker, ...)
  version: 1.0.0
  contact:
    name: The Game Pensieve API Support
servers:
  - url: http://localhost:8080
    description: Local development server
security:
  - BearerAuth: []
paths:
  /v1/heartbeat:
    get:
      tags:
        - System
      summary: Health check endpoint
      description: |
        Simple health check. Returns a `message` of "thump thump" alongside `secureMode`, which reports the
        security posture the server is enforcing: `true` when the backend runs the authenticated (`secured`
        profile) build where protected routes require a Bearer token, `false` for the default permit-all build.
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: "thump thump"
                      secureMode:
                        type: boolean
                        description: True when the backend is running the authenticated (`secured` profile) build.
                        example: false
                  errors:
                    type: 'null'
                  roundTripMs:
                    type: integer
                    format: int64
              example:
                data:
                  message: "thump thump"
                  secureMode: false
                errors: null
                roundTripMs: 0

  /v1/auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new account
      description: |
        Create a new user account. `email` and `password` are required and the body is flat (there is no
        entity-key wrapper). The email must be unique — registering an email that already has an account is
        rejected with a 400. Public endpoint: no token required even under the `secured` profile.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: "collector@example.com"
              password: "Sup3rSecret!"
      responses:
        '201':
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterDataResponse'
              example:
                data:
                  id: 1
                  email: "collector@example.com"
                errors: null
                roundTripMs: 12
        '400':
          description: Missing email/password, or an account with that email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                data: null
                errors:
                  - "Registration failed, an account with email: 'collector@example.com' already exists."

  /v1/auth/login:
    post:
      tags:
        - Authentication
      summary: Log in and obtain tokens
      description: |
        Exchange credentials for a short-lived access token and a longer-lived, revocable refresh token.
        Send the access token as `Authorization: Bearer <accessToken>` on protected routes. Public endpoint:
        no token required.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: "collector@example.com"
              password: "Sup3rSecret!"
      responses:
        '200':
          description: Authentication succeeded; tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthDataResponse'
              example:
                data:
                  accessToken: "eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJjb2xsZWN0b3JAZXhhbXBsZS5jb20ifQ.signature"
                  refreshToken: "PHCQ8m1k0t9rJv3w7s2A6bQx4nL5dZ0uHcRfTgYkImE"
                  tokenType: "Bearer"
                  expiresInMs: 900000
                errors: null
                roundTripMs: 18
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                data: null
                errors:
                  - "Invalid email or password."

  /v1/auth/refresh:
    post:
      tags:
        - Authentication
      summary: Rotate tokens using a refresh token
      description: |
        Exchange a valid refresh token for a new access token and a new refresh token. The presented refresh
        token is single-use: it is revoked as part of the call, so the previous refresh token can no longer be
        replayed. Public endpoint: no access token required.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            example:
              refreshToken: "PHCQ8m1k0t9rJv3w7s2A6bQx4nL5dZ0uHcRfTgYkImE"
      responses:
        '200':
          description: Refresh succeeded; a new token pair is issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthDataResponse'
              example:
                data:
                  accessToken: "eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJjb2xsZWN0b3JAZXhhbXBsZS5jb20ifQ.newsignature"
                  refreshToken: "Zk2pQ9w0Lr4Jv7s1A6bQx3nL8dZ5uHcRfTgYkImEnew"
                  tokenType: "Bearer"
                  expiresInMs: 900000
                errors: null
                roundTripMs: 14
        '401':
          description: The refresh token is missing, invalid, expired, or already used
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                data: null
                errors:
                  - "Invalid refresh token."

  /v1/auth/me:
    get:
      tags:
        - Authentication
      summary: Get the current caller's identity and effective role
      description: |
        Return the authenticated caller's `id`, `email`, effective `role`, and `accessUntil` (the access-window
        expiry, epoch milliseconds, or `null` for no window). The role is resolved per-request the same way every
        other request resolves it, so the caller never has to re-derive it from billing state.
        Under the `secured` profile this requires a valid `Bearer` access token (an anonymous call returns 401).
        In the default (unsecured) build there is no authentication, so the request resolves to the seeded public
        showcase owner and always reports the `GUEST` role.

        When an **ADMIN** sends the `X-Act-As-Owner` header, the primary `id`/`email`/`role` report the admin and
        the `impersonating` field carries the user being acted as. For everyone else the header is ignored and
        `impersonating` is `null`.
      parameters:
        - $ref: '#/components/parameters/ActAsOwner'
      responses:
        '200':
          description: The current caller's identity and effective role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeDataResponse'
              examples:
                normal:
                  summary: A normal authenticated caller
                  value:
                    data:
                      id: 42
                      email: "collector@example.com"
                      role: "TRIAL"
                      accessUntil: 1785484800000
                      impersonating: null
                    errors: null
                    roundTripMs: 6
                impersonating:
                  summary: An admin impersonating user 42 via X-Act-As-Owner
                  value:
                    data:
                      id: 1
                      email: "admin@example.com"
                      role: "ADMIN"
                      accessUntil: null
                      impersonating:
                        id: 42
                        email: "collector@example.com"
                        role: "PAID"
                    errors: null
                    roundTripMs: 6
        '401':
          description: No valid access token was provided (secured profile only)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                data: null
                errors:
                  - "Full authentication is required to access this resource."

  /v1/toys:
    post:
      tags:
        - Toys
      summary: Create a new toy
      description: |
        Create a new toy. `name`, `set`, and `customFieldValues` are required (send an empty
        `customFieldValues` array if there are no values). A toy with the same `name` and `set`
        as an existing toy is rejected with a 400.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                toy:
                  $ref: '#/components/schemas/ToyRequest'
              required:
                - toy
            example:
              toy:
                name: "Darkwing Duck"
                set: "Misc"
                customFieldValues:
                  - customFieldId: 1
                    customFieldName: "Broken"
                    customFieldType: "boolean"
                    value: "false"
                  - customFieldId: 11
                    customFieldName: "Quantity"
                    customFieldType: "number"
                    value: "1"
      responses:
        '201':
          description: Toy created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToyDataResponse'
              example:
                data:
                  key: "toy"
                  id: 1
                  name: "Darkwing Duck"
                  set: "Misc"
                  createdAt: 1757970298640
                  updatedAt: 1757970298640
                  deletedAt: null
                  customFieldValues:
                    - customFieldId: 1
                      customFieldName: "Broken"
                      customFieldType: "boolean"
                      value: "false"
                    - customFieldId: 11
                      customFieldName: "Quantity"
                      customFieldType: "number"
                      value: "1"
                errors: null
                roundTripMs: 9
        '400':
          description: Invalid input data (e.g. blank name, or duplicate name+set)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                data: null
                errors:
                  - "Name is required for a Toy"

  /v1/toys/{id}:
    get:
      tags:
        - Toys
      summary: Get a toy by ID
      parameters:
        - $ref: '#/components/parameters/EntityId'
      responses:
        '200':
          description: Toy found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToyDataResponse'
              example:
                data:
                  key: "toy"
                  id: 1
                  name: "Darkwing Duck"
                  set: "Misc"
                  createdAt: 1757970298640
                  updatedAt: 1757970298640
                  deletedAt: null
                  customFieldValues:
                    - customFieldId: 1
                      customFieldName: "Broken"
                      customFieldType: "boolean"
                      value: "true"
                    - customFieldId: 11
                      customFieldName: "Quantity"
                      customFieldType: "number"
                      value: "1"
                    - customFieldId: 12
                      customFieldName: "Notes"
                      customFieldType: "text"
                      value: "10 / 10 no notes"
                errors: null
                roundTripMs: 4
        '404':
          description: Toy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                data: null
                errors:
                  - "Resource Not Found: toy not found in the database with id: 1"
    put:
      tags:
        - Toys
      summary: Update a toy
      parameters:
        - $ref: '#/components/parameters/EntityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                toy:
                  $ref: '#/components/schemas/ToyRequest'
              required:
                - toy
      responses:
        '200':
          description: Toy updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToyDataResponse'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Toy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Toys
      summary: Delete a toy
      parameters:
        - $ref: '#/components/parameters/EntityId'
      responses:
        '204':
          description: Toy deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: Toy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/toys/function/search:
    post:
      tags:
        - Toys
      summary: Search toys with filters
      description: |
        Search and filter toys. Send a `filters` array; an empty array returns all toys.
        Combine multiple filters (they are ANDed), add `order_by`/`order_by_desc` to sort, and
        `limit`/`offset` to paginate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilterRequest'
            example:
              filters:
                - key: toy
                  field: set
                  operator: equals
                  operand: "Misc"
                - key: toy
                  field: name
                  operator: order_by
                  operand: ""
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ToyResponse'
                  errors:
                    type: 'null'
                  roundTripMs:
                    type: integer
                    format: int64
              example:
                data:
                  - key: "toy"
                    id: 1
                    name: "Darkwing Duck"
                    set: "Misc"
                    createdAt: 1757970298640
                    updatedAt: 1757970298640
                    deletedAt: null
                    customFieldValues:
                      - customFieldId: 1
                        customFieldName: "Broken"
                        customFieldType: "boolean"
                        value: "true"
                errors: null
                roundTripMs: 6

  /v1/systems:
    post:
      tags:
        - Systems
      summary: Create a new system
      description: |
