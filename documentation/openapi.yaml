                  - name: "Completed"
                    order: 2
                    isDefault: false
      responses:
        '201':
          description: Custom field created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomFieldDataResponse'
              example:
                data:
                  id: 1
                  name: "Completion Status"
                  type: "dropdown"
                  entityKey: "videoGame"
                  order: 0
                  options:
                    - id: 1
                      customFieldId: 1
                      name: "Not Started"
                      isDefault: true
                      order: 0
                    - id: 2
                      customFieldId: 1
                      name: "In Progress"
                      isDefault: false
                      order: 1
                    - id: 3
                      customFieldId: 1
                      name: "Completed"
                      isDefault: false
                      order: 2
                errors: null
                roundTripMs: 10
        '400':
          description: Invalid input data (e.g. blank name, unknown type, or an enum type with no/invalid options)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                data: null
                errors:
                  - "Exactly one option must be marked as the default. Found: 0."
    get:
      tags:
        - Custom Fields
      summary: Get all custom fields
      description: |
        List every custom-field definition for the resolved owner. Part of the anonymous, showcase-scoped read
        surface: reachable **without a token** and honors the `X-Showcase` header (GUEST-scoped; unknown or
        not-visible slug → **404**); anonymous requests with no header resolve to the **default showcase** owner.
      security: []
      parameters:
        - $ref: '#/components/parameters/ShowcaseView'
      responses:
        '200':
          description: List of all custom fields
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomFieldResponse'
                  errors:
                    type: 'null'
        '404':
          description: The `X-Showcase` header named a slug that does not exist or is not currently visible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/custom_fields/entity/{key}:
    get:
      tags:
        - Custom Fields
      summary: Get custom fields by entity key
      description: |
        Retrieve the custom-field definitions for a specific entity type — the front end builds its
        custom-field columns from these.

        Part of the anonymous, showcase-scoped read surface: reachable **without a token** and, like the
        entity read/search/filters routes, it honors the `X-Showcase` header (browse a public showcase,
        GUEST-scoped; unknown or not-visible slug → **404**). Anonymous requests with no header resolve to the
        **default showcase** owner. Writes (`POST`/`PUT`/`DELETE`) stay authenticated.
      security: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
            enum: [toy, system, videoGame, videoGameBox, boardGame, boardGameBox]
          description: Entity key to get custom fields for
        - $ref: '#/components/parameters/ShowcaseView'
      responses:
        '200':
          description: List of custom-field definitions for the entity
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomFieldResponse'
                  errors:
                    type: 'null'
        '404':
          description: Invalid entity key, or the `X-Showcase` header named a slug that does not exist or is not currently visible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/custom_fields/{id}:
    get:
      tags:
        - Custom Fields
      summary: Get a custom field by ID
      parameters:
        - $ref: '#/components/parameters/EntityId'
      responses:
        '200':
          description: Custom field found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomFieldDataResponse'
        '404':
          description: Custom field not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Custom Fields
      summary: Update a custom field's name and order
      parameters:
        - $ref: '#/components/parameters/EntityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                custom_field:
                  type: object
                  properties:
                    name:
                      type: string
                      description: New name for the custom field
                    order:
                      type: integer
                      description: Display order for the custom field
                    options:
                      type: array
                      description: |
                        Full replacement list of options for enum-type fields (dropdown, radio_button, progress_bar).
                        Omit this field entirely to leave options unchanged.
                        Options absent from the list are deleted (values cascade to the default option).
                        Exactly one option must have isDefault set to true.
                        Use id: null to create a new option inline.
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                            nullable: true
                            description: ID of an existing option; null to create a new option
                          name:
                            type: string
                            description: Display name of the option
                          order:
                            type: integer
                            description: Display order for the option
                          isDefault:
                            type: boolean
                            description: Whether this option is the default
                        required:
                          - name
                          - order
                          - isDefault
                  required:
                    - name
                    - order
              required:
                - custom_field
            example:
              custom_field:
                name: "Updated Field Name"
                order: 2
                options:
                  - id: 1
                    name: "Option A"
                    order: 0
                    isDefault: true
                  - id: null
                    name: "New Option"
                    order: 1
                    isDefault: false
      responses:
        '200':
          description: Custom field updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomFieldDataResponse'
        '404':
          description: Custom field not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Custom Fields
      summary: Delete a custom field
      parameters:
        - $ref: '#/components/parameters/EntityId'
      responses:
        '204':
          description: Custom field deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: Custom field not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/filters/{entity}:
    get:
      tags:
