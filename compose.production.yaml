services:
  frontend:
    image: sethcondie/the-game-pensieve-web:latest
    ports:
      - "4200:3000" # Next.js server listens on 3000
    environment:
      # Server-side only; must include the /v1 prefix. Reaches the backend service
      # over the compose network.
      API_BASE_URL: http://backend:8080/v1
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: sethcondie/the-game-pensieve-api:latest
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - db
      - flyway
    restart: unless-stopped

  flyway:
    image: sethcondie/the-game-pensieve-flyway:latest
    command: -configFiles=/flyway/conf/flyway.config -locations=filesystem:/flyway/sql -connectRetries=60 migrate
    depends_on:
      - db

  db:
    image: postgres:16.2-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: pensieve-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
