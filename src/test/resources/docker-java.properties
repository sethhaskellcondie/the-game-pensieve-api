# TestContainers 1.21.0 hardcodes Docker API version 1.32 as its fallback default.
# Docker Desktop 29.x (and Docker Engine 29.x on Linux/Mac) dropped support for API
# versions below 1.40, causing every Docker connection attempt to return HTTP 400.
#
# Setting api.version here overrides that hardcoded default. TestContainers shades its
# own copy of docker-java-core, which loads this file from the classpath before falling
# back to version 1.32. This fix applies to any OS running Docker Desktop/Engine 29+.
#
# The IDE warning that this is unused is a false positive, the api.version is read by
# TestContainers at runtime
api.version=1.41