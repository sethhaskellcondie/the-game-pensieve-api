# OAuth2 resource-server config, active only under the `secured` profile (compose: docker,secured; tests:
# test-container,secured). The secured chain validates Keycloak RS256 access tokens: iss + aud + signature.
#
# The issuer and JWKS URI are split deliberately (same split as the MCP sidecar): `issuer` is the host-facing
# canonical URL that Keycloak stamps into `iss` (KC_HOSTNAME), while `jwk-set-uri` is fetched over the internal
# compose network (a container cannot reach localhost:8081). In prod both become the public https URLs.
# The Testcontainers suite overrides issuer + jwk-set-uri to the container's dynamic URL via @DynamicPropertySource;
# the audience stays the fixed /mcp URL (a realm-mapper constant), validated to block confused-deputy use.
pensieve.oauth2.issuer=${PENSIEVE_OAUTH2_ISSUER:http://localhost:8081/realms/pensieve}
pensieve.oauth2.jwk-set-uri=${PENSIEVE_OAUTH2_JWK_SET_URI:http://keycloak:8080/realms/pensieve/protocol/openid-connect/certs}
pensieve.oauth2.audience=${PENSIEVE_OAUTH2_AUDIENCE:http://localhost:8090/mcp}
