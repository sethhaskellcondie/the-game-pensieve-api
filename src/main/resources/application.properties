# these settings are global for every profile, other settings are profile specific
# they are found in application-<profile>.properties

## default connection pool
spring.datasource.hikari.connectionTimeout=20000
spring.datasource.hikari.maximumPoolSize=30

#flyway properties
spring.flyway.locations=classpath:migrations
spring.flyway.validateMigrationNaming=true

#logging Spring Boot uses LogBack
logging.level.root = INFO
logging.file.path=game_pensieve_log.log

#the default active profile, can be overwritten
spring.profiles.active=local

#virtual threads (Project Loom) - improves throughput for I/O-bound request handling
spring.threads.virtual.enabled=true

#entitlement - length of the auto-granted trial (days) stamped on JIT provisioning at first login; env-overridable.
#OAuth2 resource-server settings for the secured profile live in application-secured.properties.
entitlement.trial-days=${ENTITLEMENT_TRIAL_DAYS:30}

